name: Run Chainsaw Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup Hurl
        uses: gacts/install-hurl@07862af8bae89d374a3e82e359293d6e9d73d900 # v1.3.2

      - name: Setup local cluster, deploy Ztoperator, make virtualenv, expose ingress and run chainsaw tests
        run: |
          make local deploy virtualenv expose-ingress chainsaw-test-remote
