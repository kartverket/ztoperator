kind: AuthPolicy
metadata:
  name: auth-policy
  labels:
    ztoperator.kartverket.no/controller: authpolicy
    app.kubernetes.io/managed-by: ztoperator
status:
  phase: Ready
  ready: true
  message: AuthPolicy ready.
