apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: audience-referencing
spec:
  skip: false
  concurrent: true
  skipDelete: false
  namespaceTemplate:
    metadata:
      labels:
        istio-injection: enabled
  steps:
    - try:
        - create:
            file: ../../../resources/skiperator/application.yaml
        - create:
            file: authpolicy.yaml
        - assert:
            file: authpolicy-assert.yaml
        - patch:
            resource:
              apiVersion: ztoperator.kartverket.no/v1alpha1
              kind: AuthPolicy
              metadata:
                name: auth-policy
              spec:
                allowedAudiences:
                  - value: blablabla
                    valueFrom:
                      configMapKeyRef:
                        name: cm
                        key: KEY
            expect:
              - match:
                  apiVersion: ztoperator.kartverket.no/v1alpha1
                  kind: AuthPolicy
                  metadata:
                    name: auth-policy
                check:
                  # patch MUST fail
                  ($error != null): true

                  # validation message MUST be present
                  contains(
                    $error,
                    "AuthPolicy.ztoperator.kartverket.no \"auth-policy\" is invalid: spec.allowedAudiences[0]: Invalid value: \"object\": one audience cannot be defined from both 'value' and 'valueFrom'"
                  ): true